server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location ^~ /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location ^~ /icons/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location = /manifest.webmanifest {
    add_header Cache-Control "public, max-age=0, must-revalidate" always;
    try_files $uri =404;
  }

  location = /sw.js {
    add_header Cache-Control "public, max-age=0, must-revalidate" always;
    try_files $uri =404;
  }

  location ~* ^/(favicon\.svg|favicon\.ico|favicon-96x96\.png|apple-touch-icon\.png|web-app-manifest-192x192\.png|web-app-manifest-512x512\.png)$ {
    add_header Cache-Control "public, max-age=86400" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "public, max-age=0, must-revalidate" always;
    try_files $uri $uri/ /index.html;
  }
}
