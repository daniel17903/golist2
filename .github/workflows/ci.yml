name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  web-sharing-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.6-alpine3.22
        env:
          POSTGRES_DB: golist
          POSTGRES_USER: golist
          POSTGRES_PASSWORD: golist
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U golist -d golist"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: golist
      PGDATABASE: golist
      PGPASSWORD: golist
      API_HOST: 0.0.0.0
      API_PORT: 3000
      GOLIST_INTEGRATION_BASE_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:migrate -w apps/backend
      - run: npm run build -w apps/backend
      - name: Start backend
        run: npm run start -w apps/backend &
      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:3000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time" >&2
          exit 1
      - run: npm run test:integration -w apps/web
