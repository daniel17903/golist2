name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint -w apps/web
      - run: npm run typecheck -w apps/web
      - run: npm run test -w apps/web
      - run: npm run build -w apps/web

  web-e2e-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Resolve Playwright version
        id: playwright
        run: echo "version=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright.outputs.version }}
      - run: npx playwright install-deps chromium
      - name: Install Playwright Chromium (with retry)
        run: |
          for attempt in 1 2 3; do
            if timeout 180 npx playwright install chromium; then
              exit 0
            fi
            echo "Playwright browser install hung or failed (attempt ${attempt}/3), retrying..."
          done
          echo "Playwright browser install failed after 3 attempts"
          exit 1
      - run: npm run test:e2e -w apps/web
