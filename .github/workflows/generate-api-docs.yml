name: Generate API Docs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-api-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli@2.18.0

      - name: Build OpenAPI HTML docs
        run: redocly build-docs apps/api-spec/openapi.yaml -o apps/api-spec/openapi.html

      - name: Commit generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api-spec/openapi.html
          if git diff --cached --quiet; then
            echo "No documentation changes to commit"
            exit 0
          fi
          git commit -m "docs(api): regenerate OpenAPI HTML"
          git push
